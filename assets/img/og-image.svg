<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fond -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="50%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2B3A5C;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#060810;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#4a5e8a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#060810;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Fond principal -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Ligne lumineuse en haut -->
  <defs>
    <linearGradient id="topline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2B3A5C;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#6B8DD6;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#6B8DD6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2B3A5C;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect y="0" width="1200" height="2" fill="url(#topline)"/>

  <!-- Logo mark -->
  <rect x="72" y="72" width="52" height="52" fill="#2B3A5C"/>
  <text x="98" y="108" font-family="Georgia, serif" font-size="34" font-style="italic" font-weight="400" fill="#F8F6F1" text-anchor="middle">A</text>

  <!-- Nom -->
  <text x="140" y="107" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#F8F6F1" letter-spacing="3">Aurelys Studio</text>

  <!-- Titre principal -->
  <text x="72" y="290" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#F8F6F1" letter-spacing="-2">Votre site web</text>
  <text x="72" y="375" font-family="Georgia, serif" font-size="72" font-weight="400" font-style="italic" fill="rgba(248,246,241,0.65)" letter-spacing="-2">en 7 jours.</text>

  <!-- Sous-titre -->
  <text x="72" y="450" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="rgba(248,246,241,0.5)" letter-spacing="1">Pour restaurants, cafés et commerces locaux · Normandie &amp; France entière</text>

  <!-- Séparateur -->
  <rect x="72" y="490" width="60" height="1" fill="rgba(107,141,214,0.6)"/>

  <!-- Prix -->
  <text x="72" y="535" font-family="Georgia, serif" font-size="26" font-weight="400" fill="rgba(248,246,241,0.8)">À partir de 1 500 € · 49 €/mois</text>

  <!-- URL -->
  <text x="1128" y="572" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="rgba(248,246,241,0.25)" text-anchor="end" letter-spacing="2">aurelysstudio.com</text>
</svg>
