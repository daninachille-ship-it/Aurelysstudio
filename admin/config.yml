backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Paramètres du site"
    files:

      - name: "site"
        label: "Toutes les informations"
        file: "content/site.json"
        format: json
        fields:

          # ── AGENCE ──────────────────────────────────────────────
          - label: "Agence"
            name: "company"
            widget: "object"
            summary: "Nom, email, localisation"
            fields:
              - { label: "Nom de l'agence", name: "name", widget: "string" }
              - { label: "Email de contact", name: "email", widget: "string", pattern: ['.+@.+\..+', "Adresse email invalide"] }
              - { label: "Site web", name: "website", widget: "string" }
              - { label: "Localisation (ville/région)", name: "location", widget: "string", hint: "Ex: Basse-Normandie" }
              - { label: "Zone de service", name: "service_zone", widget: "string", hint: "Ex: Basse-Normandie & France entière" }
              - { label: "Description courte (footer)", name: "description", widget: "text" }
              - { label: "Texte copyright", name: "copyright", widget: "string" }

          # ── HERO ────────────────────────────────────────────────
          - label: "Hero (bandeau principal)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Accroche (eyebrow)", name: "eyebrow", widget: "string", hint: "Ex: Agence web — Basse-Normandie" }
              - { label: "Description sous le titre", name: "subtext", widget: "text", hint: "Le texte descriptif sous la grande accroche" }
              - { label: "Bouton principal", name: "cta_primary", widget: "string", hint: "Ex: Demander un devis" }
              - { label: "Bouton secondaire", name: "cta_secondary", widget: "string", hint: "Ex: Voir une démo →" }

          # ── TARIFS ──────────────────────────────────────────────
          - label: "Tarifs"
            name: "pricing"
            widget: "object"
            summary: "Setup {{fields.setup_price}} · Mensuel {{fields.monthly_price}}"
            fields:
              - { label: "Prix setup", name: "setup_price", widget: "string", hint: "Ex: 1 200 €" }
              - { label: "Label setup (carte tarifs)", name: "setup_label", widget: "string" }
              - { label: "Conditions setup", name: "setup_terms", widget: "string" }
              - { label: "Prix mensuel", name: "monthly_price", widget: "string", hint: "Ex: 39 €" }
              - { label: "Label mensuel (carte tarifs)", name: "monthly_label", widget: "string" }
              - { label: "Conditions mensuel", name: "monthly_terms", widget: "string" }
              - { label: "Mention légale (bas de page tarifs)", name: "legal_note", widget: "text" }

          # ── L'OFFRE (INCLUS) ────────────────────────────────────
          - label: "L'offre — Ce qui est inclus"
            name: "inclus"
            widget: "object"
            fields:
              - { label: "Phrase d'accroche", name: "description", widget: "text" }
              - label: "Éléments inclus"
                name: "items"
                widget: "list"
                label_singular: "Élément"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Titre", name: "name", widget: "string" }
                  - { label: "Description courte", name: "desc", widget: "string" }

          # ── DÉMO ────────────────────────────────────────────────
          - label: "Exemple de réalisation (Démo)"
            name: "demo"
            widget: "object"
            fields:
              - label: "Photos de l'exemple (1 à 4)"
                name: "photos"
                widget: "list"
                required: false
                max: 4
                hint: "Ajoutez 1 à 4 captures d'écran. Elles s'affichent automatiquement en grille : 1=pleine largeur, 2=côte à côte, 3=grande + 2 petites, 4=2×2."
                field:
                  label: "Photo"
                  name: "photo"
                  widget: "image"
              - { label: "Texte de la barre d'URL", name: "url_text", widget: "string", hint: "Ex: aurelysstudio.fr/demo · Maison Blend — Coffee Shop · Paris 9e" }
              - { label: "Légende sous la fenêtre", name: "caption", widget: "string", hint: "Ex: Design sur-mesure · Admin autonome · Livraison 7 jours" }

          # ── CONTACT ─────────────────────────────────────────────
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Délai affiché", name: "response_time", widget: "string", hint: "Ex: Réponse sous 24h · Livraison 7 jours" }
              - { label: "Conditions de paiement", name: "payment_terms", widget: "string", hint: "Ex: En 2 fois · Virement ou CB" }

          # ── FAQ ─────────────────────────────────────────────────
          - label: "FAQ"
            name: "faq"
            widget: "list"
            label_singular: "Question"
            summary: "{{fields.question}}"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Réponse", name: "answer", widget: "text" }
